name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Verify Node/pnpm version alignment
        run: |
          echo "node: $(nix develop -c node --version)"
          echo "pnpm runs on: $(nix develop -c pnpm exec node --version)"

      - name: Verify (typecheck + lint + test + build)
        run: nix develop -c pnpm verify
