name: Package Desktop

on:
  workflow_dispatch:

jobs:
  linux:
    name: Linux AppImage, deb, and packaged GUI smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: nix develop -c pnpm build

      - name: Package Linux desktop
        run: nix develop -c pnpm --filter @donecheck/desktop package:linux

      - name: Real packaged GUI smoke (xvfb)
        run: |
          nix develop -c bash -c '
            set -e
            cd apps/desktop
            xvfb-run -a node scripts/smoke-packaged.mjs --platform linux
          '

      - name: Assert release artifacts
        shell: bash
        run: |
          set -e
          if [ ! -d apps/desktop/release ] || [ -z "$(ls -A apps/desktop/release)" ]; then
            echo "::error::apps/desktop/release is missing or empty"
            exit 1
          fi
          echo "Release contents:"
          ls -la apps/desktop/release

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: donecheck-desktop-linux
          path: apps/desktop/release/**/*
          if-no-files-found: error

  windows:
    name: Windows NSIS and unpacked
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Pin pnpm
        run: corepack prepare pnpm@11.8.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm build

      - name: Debug pnpm resolution
        shell: bash
        run: |
          set +e
          echo "=== ComSpec ==="
          echo "$ComSpec"
          echo "=== which pnpm ==="
          which pnpm 2>&1
          echo "=== which pnpm.cmd ==="
          which pnpm.cmd 2>&1
          echo "=== ls corepack shims ==="
          ls -la "$(dirname "$(which node)")"/pnpm* 2>&1
          echo "=== pnpm --version (bash direct) ==="
          pnpm --version 2>&1
          echo "=== cmd.exe /c pnpm.cmd --version ==="
          "$ComSpec" /d /s /c "pnpm.cmd --version" 2>&1
          echo "=== cmd.exe /c pnpm --version ==="
          "$ComSpec" /d /s /c "pnpm --version" 2>&1
          echo "=== node spawnSync: cmd.exe joined ==="
          node -e 'const{spawnSync}=require("child_process");const r=spawnSync(process.env.ComSpec||"cmd.exe",["/d","/s","/c","pnpm.cmd --version"],{stdio:"inherit"});console.log(JSON.stringify({status:r.status,signal:r.signal,error:r.error?r.error.message:null}))'
          echo "=== node spawnSync: cmd.exe separate args ==="
          node -e 'const{spawnSync}=require("child_process");const r=spawnSync(process.env.ComSpec||"cmd.exe",["/d","/s","/c","pnpm.cmd","--version"],{stdio:"inherit"});console.log(JSON.stringify({status:r.status,signal:r.signal,error:r.error?r.error.message:null}))'
          echo "=== node spawnSync: pnpm.cmd shell:true ==="
          node -e 'const{spawnSync}=require("child_process");const r=spawnSync("pnpm.cmd",["--version"],{stdio:"inherit",shell:true});console.log(JSON.stringify({status:r.status,signal:r.signal,error:r.error?r.error.message:null}))'
          echo "=== node spawnSync: pnpm shell:true ==="
          node -e 'const{spawnSync}=require("child_process");const r=spawnSync("pnpm",["--version"],{stdio:"inherit",shell:true});console.log(JSON.stringify({status:r.status,signal:r.signal,error:r.error?r.error.message:null}))'
          exit 0

      - name: Package Windows desktop
        run: pnpm --filter @donecheck/desktop package:win

      - name: Assert release artifacts
        shell: bash
        run: |
          set -e
          if [ ! -d apps/desktop/release ] || [ -z "$(ls -A apps/desktop/release)" ]; then
            echo "::error::apps/desktop/release is missing or empty"
            exit 1
          fi
          echo "Release contents:"
          ls -la apps/desktop/release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: donecheck-desktop-windows
          path: apps/desktop/release/**/*
          if-no-files-found: error
